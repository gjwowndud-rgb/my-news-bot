name: Daily Investment Report

on:
  schedule:
    - cron: '15 22 * * *'  # 한국 시간 오전 7:15 (UTC 22:15)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 안정적인 3.10 버전 사용

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 최신 모델 인식을 위해 google-generativeai 버전을 높여 설치합니다.
          pip install --upgrade requests google-generativeai

      - name: Run script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python newsnews_bot.py
